<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProCare - Delivery & Driver</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#1F4E79;--blue:#2E75B6;--pale:#DEEAF1;
  --green:#1A6B3C;--gbg:#D4EDDA;--gmid:#2D9E5F;
  --amber:#7B5200;--abg:#FFF3CD;--amid:#D4930A;
  --red:#8B0000;--rbg:#F8D7DA;--rmid:#C0392B;
  --lgray:#F4F6F9;--border:#E2E8F0;
  --text:#1a2332;--text2:#4a5568;--text3:#718096;
  --sh:0 2px 12px rgba(0,0,0,0.07);--shl:0 8px 32px rgba(0,0,0,0.13);
}
body{font-family:'DM Sans',sans-serif;background:var(--lgray);color:var(--text);min-height:100vh}
.hdr{background:var(--navy);position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,0,0,0.3)}
.hdr-i{display:flex;align-items:stretch}
.hdr-b{padding:12px 20px;border-right:1px solid rgba(255,255,255,0.12)}
.hdr-b h1{font-family:'Playfair Display',serif;font-size:16px;color:#fff}
.hdr-b p{font-size:9px;color:rgba(255,255,255,0.4);font-family:'DM Mono',monospace;margin-top:1px;letter-spacing:1px;text-transform:uppercase}
.hdr-w{padding:12px 14px;border-right:1px solid rgba(255,255,255,0.12);display:flex;flex-direction:column;justify-content:center}
.hdr-w label{font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;font-family:'DM Mono',monospace}
.hdr-w select{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:11px;padding:3px 7px;border-radius:4px;cursor:pointer;margin-top:2px;font-family:'DM Sans',sans-serif}
.hdr-w select option{background:var(--navy)}
.hdr-r{padding:12px 16px;display:flex;align-items:center;gap:8px;margin-left:auto}
.live{width:6px;height:6px;background:#2ecc71;border-radius:50%;box-shadow:0 0 7px #2ecc71;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hdr-t{font-size:10px;color:rgba(255,255,255,0.35);font-family:'DM Mono',monospace}
.nav{background:#fff;border-bottom:2px solid var(--border);display:flex;overflow-x:auto;position:sticky;top:53px;z-index:190;box-shadow:0 1px 6px rgba(0,0,0,0.05)}
.nav::-webkit-scrollbar{height:3px}.nav::-webkit-scrollbar-thumb{background:var(--blue)}
.ntab{padding:10px 13px;font-size:11px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .18s;display:flex;align-items:center;gap:5px;user-select:none;flex-shrink:0}
.ntab:hover{color:var(--text);background:var(--lgray)}
.ntab.active{color:var(--navy);border-bottom-color:var(--blue);background:#EBF5FB}
.nsep{width:1px;background:var(--border);margin:6px 0;flex-shrink:0}
.nd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nd-g{background:var(--gmid)}.nd-a{background:var(--amid)}.nd-r{background:var(--rmid)}.nd-0{background:#CBD5E0}
.mc{padding:16px;max-width:1440px;margin:0 auto}
/* Regional */
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px}
.dc{background:#fff;border-radius:10px;box-shadow:var(--sh);overflow:hidden;cursor:pointer;transition:all .2s;border:2px solid transparent}
.dc:hover{box-shadow:var(--shl);transform:translateY(-2px)}
.dc-h{padding:10px 12px 7px;display:flex;align-items:center;gap:8px}
.di{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.dn{flex:1;min-width:0}.dn-t{font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dn-m{font-size:9px;color:var(--text3);margin-top:1px}
.ds{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;min-width:38px;text-align:right}
.kb{padding:0 12px 8px;display:flex;flex-direction:column;gap:4px}
.kr{display:flex;align-items:center;gap:6px}
.kl{font-size:9px;color:var(--text3);width:88px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kt{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.kf{height:100%;border-radius:2px;transition:width .7s}
.kd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.df{padding:6px 12px;background:var(--lgray);display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border)}
.dfg{display:flex;gap:7px}
.dfc{font-size:9px;font-weight:500}
.dtr{font-size:9px;font-family:'DM Mono',monospace}
/* Dept detail */
.dh{background:#fff;border-radius:10px;box-shadow:var(--sh);padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:13px}
.dhi{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.bsc{font-family:'DM Mono',monospace;font-size:30px;font-weight:500}
/* Tab strip */
.dts{display:flex;gap:0;border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:13px;background:#fff;flex-wrap:wrap}
.dt{padding:7px 13px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all .15s;font-family:'DM Sans',sans-serif;border-right:1px solid var(--border)}
.dt:last-child{border-right:none}
.dt.active{background:var(--navy);color:#fff}
.dt:hover:not(.active){background:var(--lgray)}
/* Why banner */
.wb{background:var(--navy);border-radius:8px;padding:12px 15px;margin-bottom:13px;display:flex;align-items:flex-start;gap:10px}
.wbi{font-size:17px;flex-shrink:0;margin-top:1px}
.wbt h4{color:#fff;font-size:12px;font-weight:600;margin-bottom:2px}
.wbt p{color:rgba(255,255,255,0.68);font-size:10px;line-height:1.5}
/* KPI cards */
.kg{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;margin-bottom:16px}
.kc{background:#fff;border-radius:8px;border:1px solid var(--border);overflow:hidden}
.kct{padding:10px 12px 6px;display:flex;align-items:flex-start;gap:8px}
.kr2{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);background:var(--lgray);border-radius:3px;padding:2px 4px;flex-shrink:0;margin-top:1px}
.kn{font-size:12px;font-weight:600;line-height:1.3;flex:1}
.kva{text-align:right;flex-shrink:0}
.kv{font-family:'DM Mono',monospace;font-size:17px;font-weight:500}
.ku{font-size:9px;color:var(--text3);margin-top:1px}
.ta{font-size:12px;margin-left:2px}
.kw{padding:6px 12px;font-size:10px;color:var(--text2);line-height:1.5;background:#FAFBFC;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.kwl{font-size:8px;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);font-weight:600;display:block;margin-bottom:1px}
.kp{padding:6px 12px 10px}
.kp-t{display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-bottom:4px}
.kp-b{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.kp-f{height:100%;border-radius:3px;transition:width .9s}
.tr-r{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--border)}
.tc{padding:7px 9px}
.tl{font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.tt{font-size:9px;line-height:1.4;color:var(--text2)}
.tg{background:var(--gbg)}.tg .tl{color:var(--green)}
.ta2{background:var(--abg)}.ta2 .tl{color:var(--amber)}
.tr2{background:var(--rbg)}.tr2 .tl{color:var(--red)}
/* Employee cards */
.eg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.ec{background:#fff;border-radius:9px;border:1px solid var(--border);overflow:hidden}
.ech{padding:11px 13px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border)}
.ea{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#fff;flex-shrink:0}
.en{font-size:12px;font-weight:600}.er{font-size:9px;color:var(--text3);margin-top:1px}
.esc{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;margin-left:auto}
/* Employee KPI rows */
.ekpis{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
.ekpi-row{display:flex;align-items:center;gap:7px}
.ekpi-lbl{font-size:10px;color:var(--text3);flex:1}
.ekpi-bar{width:60px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0}
.ekpi-bar-f{height:100%;border-radius:2px}
.ekpi-val{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;min-width:38px;text-align:right}
.ekpi-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
/* Scorecard */
.esc-sec{padding:9px 13px;border-bottom:1px solid var(--border);background:#FAFBFC}
.esc-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);font-weight:600;margin-bottom:6px}
.esc-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.esc-item{display:flex;align-items:center;justify-content:space-between}
.esc-name{font-size:10px;color:var(--text2)}
.esc-stars{display:flex;gap:2px}
.star{width:12px;height:12px;border-radius:2px;cursor:pointer;transition:background .1s;background:var(--border)}
.star.on{background:var(--amid)}
.star.on-g{background:var(--gmid)}
.star.on-r{background:var(--rmid)}
/* Employee comment */
.ecom{padding:9px 13px}
.ecom-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);font-weight:600;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.ecom-hist{font-size:9px;color:var(--blue);cursor:pointer;font-weight:500;text-transform:none;letter-spacing:0}
.ecom-ta{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:5px;font-size:10px;font-family:'DM Sans',sans-serif;resize:vertical;min-height:56px;color:var(--text);background:#fff;line-height:1.5}
.ecom-ta:focus{outline:none;border-color:var(--blue)}
.ecom-save{margin-top:5px;padding:4px 11px;background:var(--navy);color:#fff;border:none;border-radius:4px;font-size:9px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.ecom-save:hover{background:var(--blue)}
.ecom-saved{font-size:9px;color:var(--green);margin-top:3px;display:none}
.hist-box{margin-top:7px;display:flex;flex-direction:column;gap:4px}
.hent{background:var(--lgray);border-radius:5px;padding:6px 8px}
.hw{font-size:8px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:2px}
.ht{font-size:10px;color:var(--text2);line-height:1.5}
/* Submission viewer */
.sv-box{background:#fff;border-radius:9px;box-shadow:var(--sh);overflow:hidden;margin-bottom:16px}
.sv-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--lgray)}
.sv-hdr h3{font-size:13px;font-weight:600;color:var(--navy)}
.sv-meta{font-size:10px;color:var(--text3)}
.sv-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:10px;font-size:9px;font-weight:600}
.sv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
.sf{padding:11px 14px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.sf-l{font-size:8px;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);font-weight:600;margin-bottom:3px}
.sf-v{font-size:13px;font-weight:500;font-family:'DM Mono',monospace}
.sf-s{font-size:8px;margin-top:2px;font-weight:600}
.sf-i{font-size:9px;color:var(--text3);margin-top:2px;line-height:1.4;font-style:italic}
.sv-notes{padding:12px 16px;border-top:1px solid var(--border);background:#FAFBFC}
.sv-nd{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.sv-empty{padding:28px 16px;text-align:center;color:var(--text3);font-size:11px}
.vbar{padding:9px 16px;background:var(--pale);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:7px}
.vbar p{font-size:10px;color:var(--navy)}
.vbtns{display:flex;gap:7px}
.vb{padding:4px 12px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .13s}
.vb-ok{background:var(--green);color:#fff}.vb-ok:hover{background:#145A32}
.vb-fl{background:var(--red);color:#fff}.vb-fl:hover{background:#6B0000}
/* Data entry */
.ep{background:#fff;border-radius:9px;box-shadow:var(--sh);padding:16px;margin-bottom:13px}
.eph{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.eph h3{font-size:13px;font-weight:600;color:var(--navy)}
.eps{font-size:10px;color:var(--text3);margin-bottom:12px}
/* Entry section tabs */
.entry-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:14px;background:var(--lgray);width:fit-content}
.etab{padding:6px 14px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all .15s;font-family:'DM Sans',sans-serif;border-right:1px solid var(--border)}
.etab:last-child{border-right:none}
.etab.active{background:var(--navy);color:#fff}
.etab:hover:not(.active){background:var(--border)}
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.ef{display:flex;flex-direction:column;gap:3px}
.ef label{font-size:10px;font-weight:600;color:var(--text2)}
.ef input{padding:7px 9px;border:1px solid var(--border);border-radius:5px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);background:#FAFBFC;transition:border-color .18s}
.ef input:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(46,117,182,.07)}
.ef-i{font-size:9px;color:var(--text3);line-height:1.4}
.ef-i b{color:var(--navy)}
.ef-e{font-size:9px;color:#bbb;font-style:italic}
/* Scorecard entry */
.sc-entry-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:12px}
.sc-entry-card{border:1px solid var(--border);border-radius:7px;overflow:hidden}
.sc-ec-hdr{padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:var(--lgray)}
.sc-ec-name{font-size:11px;font-weight:600;color:var(--text)}
.sc-ec-role{font-size:9px;color:var(--text3);margin-left:auto}
.sc-ec-body{padding:10px 12px;display:flex;flex-direction:column;gap:7px}
.sc-row{display:flex;align-items:center;gap:8px}
.sc-row-lbl{font-size:10px;color:var(--text2);width:90px;flex-shrink:0}
.sc-row-stars{display:flex;gap:3px}
.sc-star{width:20px;height:20px;border-radius:3px;cursor:pointer;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;transition:background .1s;user-select:none}
.sc-star.on{background:var(--amid);color:#fff}
.sc-row-hint{font-size:9px;color:var(--text3);font-style:italic}
.ta{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:5px;font-size:10px;font-family:'DM Sans',sans-serif;resize:vertical;min-height:52px;color:var(--text);background:#FAFBFC}
.ta:focus{outline:none;border-color:var(--blue)}
/* Buttons */
.btn{padding:7px 16px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-p{background:var(--navy);color:#fff}.btn-p:hover{background:var(--blue)}
.btn-s{background:var(--lgray);color:var(--text2);border:1px solid var(--border)}.btn-s:hover{background:var(--border)}
.btn-g{background:var(--green);color:#fff}.btn-g:hover{background:#145A32}
.btn-note{font-size:9px;color:var(--text3)}
/* Manager rating */
.mr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.mr-c{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fff}
.mr-ch{padding:9px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:var(--lgray)}
.mr-cn{font-size:11px;font-weight:600}
.mr-cd{font-size:9px;color:var(--text3)}
.mr-b{padding:11px 12px;display:flex;flex-direction:column;gap:8px}
.mr-q{display:flex;flex-direction:column;gap:3px}
.mr-qt{font-size:10px;font-weight:500;color:var(--text2)}
.mr-opts{display:flex;gap:4px;flex-wrap:wrap}
.mop{padding:3px 8px;border-radius:4px;font-size:9px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--lgray);color:var(--text3);transition:all .12s;user-select:none}
.mop-y{background:var(--gbg);color:var(--green);border-color:var(--green)}
.mop-p{background:var(--abg);color:var(--amber);border-color:var(--amber)}
.mop-n{background:var(--rbg);color:var(--red);border-color:var(--red)}
.mop-na{background:#EBF5FB;color:var(--navy);border-color:var(--blue)}
.mop-e{background:var(--gbg);color:var(--green);border-color:var(--green)}
.mop-m{background:#EBF5FB;color:var(--navy);border-color:var(--blue)}
.mop-a{background:var(--abg);color:var(--amber);border-color:var(--amber)}
.mop-b{background:var(--rbg);color:var(--red);border-color:var(--red)}
.mr-notes{padding:5px 7px;border:1px solid var(--border);border-radius:5px;font-size:10px;resize:vertical;min-height:44px;color:var(--text);background:#FAFBFC;font-family:'DM Sans',sans-serif;width:100%}
.mr-notes:focus{outline:none;border-color:var(--blue)}
.mr-foot{padding:7px 12px;background:var(--lgray);display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border)}
.mr-fl{font-size:9px;color:var(--text3)}
.mr-fv{font-family:'DM Mono',monospace;font-size:13px;font-weight:500}
/* Report */
.rep-panel{background:#fff;border-radius:9px;box-shadow:var(--sh);padding:16px}
/* Misc */
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pill{padding:4px 10px;border-radius:13px;font-size:10px;font-weight:500;display:flex;align-items:center;gap:4px}
.pg{background:var(--gbg);color:var(--green)}.pa{background:var(--abg);color:var(--amber)}.pr{background:var(--rbg);color:var(--red)}
.sc-g{color:var(--green)}.sc-a{color:var(--amber)}.sc-r{color:var(--red)}
.st{font-family:'Playfair Display',serif;font-size:18px;color:var(--navy);margin-bottom:2px}
.ss{font-size:10px;color:var(--text3);margin-bottom:12px}
.ib{background:var(--pale);border-left:3px solid var(--blue);border-radius:0 6px 6px 0;padding:8px 12px;margin-bottom:11px;font-size:10px;color:var(--navy);line-height:1.5}
.tag-rom{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:var(--pale);color:var(--navy)}
@media(max-width:600px){.mc{padding:10px}.kg,.rg,.eg,.mr-grid,.ep-grid,.sc-entry-grid{grid-template-columns:1fr}}


.pin-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#1F4E79;display:flex;align-items:center;justify-content:center;z-index:9999}
.pin-box{background:#fff;border-radius:16px;padding:40px 48px;max-width:380px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.pin-logo{font-size:28px;margin-bottom:8px}
.pin-title{font-family:'Playfair Display',serif;font-size:22px;color:#1F4E79;margin-bottom:4px}
.pin-sub{font-size:12px;color:#718096;margin-bottom:28px;line-height:1.5}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #CBD5E0;background:#fff;transition:all .2s}
.pin-dot.filled{background:#1F4E79;border-color:#1F4E79}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}

var pinBuffer = '';
var currentUser = null;

function pinKey(k) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += k;
  updatePinDots();
  if (pinBuffer.length === 4) { setTimeout(checkPin, 180); }
}
function pinDel() {
  pinBuffer = pinBuffer.slice(0, -1);
  updatePinDots();
  document.getElementById('pinError').textContent = '';
}
function pinClear() {
  pinBuffer = '';
  updatePinDots();
  document.getElementById('pinError').textContent = '';
}
function updatePinDots() {
  for (var i = 0; i < 4; i++) {
    var dot = document.getElementById('pd' + i);
    if (dot) { dot.classList.toggle('filled', i < pinBuffer.length); }
  }
}
function checkPin() {
  var entered = pinBuffer;
  pinBuffer = '';
  updatePinDots();
  if (PIN_MAP[entered]) {
    currentUser = PIN_MAP[entered];
    document.getElementById('pinScreen').style.display = 'none';
    document.getElementById('dashWrap').style.display = 'block';
    var uLabel = currentUser === '__MANAGER__' ? 'Matthew Martin (Manager)' : currentUser;
    document.getElementById('hdrUser').textContent = 'Signed in as: ' + uLabel;
    initDashboard();
  } else {
    document.getElementById('pinError').textContent = 'Incorrect PIN. Please try again.';
    var box = document.getElementById('pinBox');
    box.style.animation = 'none';
    void box.offsetHeight;
    box.style.animation = 'shake 0.3s ease';
  }
}

// ── UTILITIES ─────────────────────────────────────────────────────────
function gst(k,v){if(v===undefined||v===null||v==='')return '';if(k.li){if(v<=k.success)return'green';if(v<=k.coast)return'amber';return'red';}else{if(v>=k.success)return'green';if(v>=k.coast)return'amber';return'red';}}
function gsc(dk){const s=SUBS[CW][dk],ks=DEPTS[dk].kpis;if(!s)return 0;let t=0,n=0;ks.forEach(k=>{const v=s[k.key];if(v===undefined)return;const st=gst(k,v);t+=st==='green'?100:st==='amber'?60:20;n++;});return n?Math.round(t/n):0;}
function gtr(dk){const c=gsc(dk);const tmpW=CW;CW='p1';const p=gsc(dk);CW=tmpW;const d=c-p;if(d>5)return{a:'↑',c:VG,t:'+'+d};if(d<-5)return{a:'↓',c:VR,t:''+d};return{a:'→',c:VA,t:'~flat'};}
function scc(s){return s>=80?'sc-g':s>=55?'sc-a':'sc-r';}
function fv(k,v){if(v===undefined||v===null||v==='')return'—';if(k.unit==='%')return(+v).toFixed(1)+'%';if(k.unit==='days')return(+v).toFixed(1)+'d';if(k.unit==='miles')return(+v).toFixed(1)+'mi';if(k.unit==='score')return Math.round(+v)+'/100';return String(v);}
function bw(k,v){if(v===undefined||v===null)return 0;if(k.li){const mx=k.coast*1.7;return Math.max(4,Math.min(100,(+v/mx)*100));}return Math.max(4,Math.min(100,+v));}
function ecolor(n){const cs=['#1D6A96','#1E5631','#7B3F00','#4A235A','#8B0000','#145A32','#1A5276','#117A65','#1B4F72','#2C6B8A'];let h=0;for(let c of n)h=(h<<5)-h+c.charCodeAt(0);return cs[Math.abs(h)%cs.length];}
function wl(){return CW==='cur'?'Apr 14, 2026':CW==='p1'?'Apr 7, 2026':'Mar 31, 2026';}
function empScore(dk,en){
  const ekpis=EMP_KPIS[dk]||[];const d=EMP_DATA[CW][dk]?.[en]||{};
  let t=0,n=0;
  ekpis.forEach(k=>{const v=d[k.key];if(v===undefined)return;const s=gst(k,v);t+=s==='green'?100:s==='amber'?60:20;n++;});
  // Add scorecard score
  SC_DIMS.forEach(dim=>{const r=d[dim.key];if(r){t+=(r/5)*100;n++;}});
  return n?Math.round(t/n):0;
}

    D.kpis.forEach(kp=>{const v=sub[kp.key];const s=v!==undefined?gst(kp,v):'';const vc2=s==='green'?VG:s==='amber'?VA:s==='red'?VR:'#CBD5E0';
      h+=('<div style="display:flex;align-items:center;gap:6px"><div style="width:6px;height:6px;border-radius:50%;background:'+(vc2)+';flex-shrink:0"></div><span style="font-size:9px;color:var(--text3);flex:1">'+(kp.name)+'</span><span style="font-family:\'DM Mono\',monospace;font-size:10px;font-weight:500;color:'+(vc2)+'">'+(fv(kp,v))+'</span></div>');});
    h+=('</div>');

// ── MANAGER RATINGS ───────────────────────────────────────────────────
const QS=[

function mgrSc(k){const r=MGR_RATINGS[k]||{};let s=50;const yn={Yes:20,Partial:8,No:-15,'N/A':0};['reports','projects','comms','team'].forEach(q=>{if(r[q])s+=yn[r[q]]||0;});const ov={Exceeding:10,Meeting:0,Approaching:-10,Below:-20};if(r.overall)s+=ov[r.overall]||0;return Math.max(0,Math.min(100,s));}

// ── ROM REPORT ────────────────────────────────────────────────────────

  const ks=Object.keys(DEPTS),scs=ks.map(k=>gsc(k));
  const reg=Math.round(scs.reduce((a,b)=>a+b,0)/scs.length);

  rpt+=(('Department'.padEnd(24))+('Manager'.padEnd(22))+('Score'.padEnd(8))+('Status'.padEnd(10))+'Verified\\n'+('-'.repeat(72))+'\\n');

  rpt+=('\\nRegional Average: '+(reg)+'/100  |  On Track: '+(g)+'  |  Watch: '+(a)+'  |  Failing: '+(r)+'\\n\\n');
  const ns=ks.filter(k=>!SUBS[CW][k]?.submittedAt);const fl=ks.filter(k=>SUBS[CW][k]?.verified==='flagged');
  if(ns.length||fl.length){rpt+=(('='.repeat(60))+'\\nSECTION 2 — SUBMISSION FLAGS\\n'+('='.repeat(60))+'\\n\\n');if(ns.length)rpt+=('NOT SUBMITTED: '+(ns.map(k=>DEPTS[k].mgr).join(', '))+'\\n');if(fl.length)rpt+=('FLAGGED FOR FOLLOW-UP: '+(fl.map(k=>DEPTS[k].mgr).join(', '))+'\\n');rpt+='\n';}
  rpt+=(('='.repeat(60))+'\\nSECTION 3 — DEPARTMENT FLAGS & NOTES\\n'+('='.repeat(60))+'\\n\\n');
  ks.forEach(k=>{const D=DEPTS[k],sub=SUBS[CW][k],sc=gsc(k);const fail=D.kpis.filter(kp=>sub?.[kp.key]!==undefined&&gst(kp,sub[kp.key])==='red');const watch=D.kpis.filter(kp=>sub?.[kp.key]!==undefined&&gst(kp,sub[kp.key])==='amber');
    rpt+=((D.name.toUpperCase())+' — '+(D.mgr)+' — '+(sc)+'/100\\n');if(fail.length)rpt+=('  FAILING: '+(fail.map(kp=>kp.name+' ('+fv(kp,sub[kp.key])+')').join(', '))+'\\n');if(watch.length)rpt+=('  WATCH:   '+(watch.map(kp=>kp.name+' ('+fv(kp,sub[kp.key])+')').join(', '))+'\\n');if(!fail.length&&!watch.length)rpt+=('  All KPIs on track.\\n');if(sub?.notes)rpt+=('  Notes: '+(sub.notes)+'\\n');rpt+='\n';});
  rpt+=(('='.repeat(60))+'\\nSECTION 4 — MANAGER RATINGS\\n'+('='.repeat(60))+'\\n\\n');
  rpt+=(('Manager'.padEnd(22))+('Reports'.padEnd(10))+('Projects'.padEnd(10))+('Overall'.padEnd(12))+'Score\\n'+('-'.repeat(60))+'\\n');
  // Deduplicate managers in ratings section, exclude Sarah Rushton
  const romSeenMgrs={};
  ks.forEach(k=>{
    const D=DEPTS[k];
    if(D.mgr==='Sarah Rushton')return;
    if(romSeenMgrs[D.mgr])return;
    romSeenMgrs[D.mgr]=true;
    const r2=MGR_RATINGS[k]||{};

// ── IMPROVEMENT SUGGESTIONS ENGINE ───────────────────────────────────
// Generates specific, actionable suggestions based on actual scores
function getSuggestions(dk, empName) {
  const ed = EMP_DATA[CW][dk]?.[empName] || {};
  const ekpis = EMP_KPIS[dk] || [];
  const suggestions = [];

  // Find failing and coasting KPIs
  ekpis.forEach(kp => {
    const v = ed[kp.key];
    if (v === undefined) return;
    const s = gst(kp, v);
    if (s === 'red' || s === 'amber') {
      const tip = getKPITip(dk, kp.key, s, v, kp);
      if (tip) suggestions.push({level: s, kpi: kp.name, tip});
    }
  });

  // Scorecard suggestions
  SC_DIMS.forEach(dim => {
    const r = ed[dim.key] || 0;
    if (r > 0 && r <= 2) suggestions.push({level:'red', kpi: dim.name, tip: getScorecardTip(dim.key, r)});
    else if (r === 3) suggestions.push({level:'amber', kpi: dim.name, tip: getScorecardTip(dim.key, r)});
  });

  return suggestions;
}

function getScorecardTip(dim, rating) {
  const tips = {
    attendance: {1:'Attendance is a serious concern. Have a direct conversation documenting absences and set clear expectations. Consider whether an attendance improvement plan is needed.', 2:'Multiple attendance issues this period. Address directly in 1:1 and document the conversation.', 3:'Attendance is meeting the minimum but not consistent. Acknowledge and set the expectation for improvement.'},

    quality: {1:'Work quality is significantly below standard. Implement a review process for this employee\'s work output and provide immediate coaching on the most common errors.', 2:'Quality issues occurring. Identify the specific error patterns and provide targeted coaching.', 3:'Quality meets the minimum. Identify one recurring error type and address it specifically.'},

        h += '<div class="sc-star ' + (i <= rating ? 'on' : '') + '" onclick="setScorecard(\'' + k + '\',\'' + emp.n + '\',\'' + dim.key + '\',' + i + ',\'' + sk + '\')" title="' + i + '">' + (i <= rating ? '&#9733;' : '&#9734;') + '</div>';
      }
      h += '</div><div class="sc-row-hint" style="font-size:8px;color:var(--text3)">' + dim.hint + '</div></div>';
    });

    h += '</div></div>';
  });

  h += '</div>';
  h += '<div style="display:flex;align-items:center;gap:8px;margin-top:8px">';
  h += '<button class="btn btn-p" onclick="saveEmpData(\'' + k + '\')">Save ' + D.name + ' Employee Data</button>';
  h += '<span class="btn-note">Saves all employee metrics and scorecard ratings</span></div></div>';

  mc.innerHTML = h;
}
function updTime() {
  var n = new Date();
  var el = document.getElementById('hdrT');
  if (el) { el.textContent = n.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'}); }
}
function initDashboard() {
  buildNav();
  DV['driver'] = 'kpis';
  renderDeptFiltered('driver', document.getElementById('mc'));
  updTime();
  setInterval(updTime, 30000);
}
</script>
